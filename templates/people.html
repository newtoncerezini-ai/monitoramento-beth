{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <div>
    <span class="eyebrow">Cadastro</span>
    <h1>Responsaveis</h1>
  </div>
</header>

{% if can_write %}
  <form class="panel inline-form" method="post">
    <input name="name" required placeholder="Nome">
    <input name="email" placeholder="E-mail">
    <input name="area" placeholder="Area">
    <button class="button primary" type="submit">Adicionar</button>
  </form>
{% endif %}

<section class="panel">
  <table>
    <thead><tr><th>Nome</th><th>E-mail</th><th>Area</th><th>Acoes vinculadas</th></tr></thead>
    <tbody>
      {% for person in people %}
      <tr>
        <td>{{ person.name }}</td>
        <td>{{ person.email or "-" }}</td>
        <td>{{ person.area or "-" }}</td>
        <td>{{ person.action_count }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
